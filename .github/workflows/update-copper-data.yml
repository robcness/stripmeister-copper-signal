name: Update copper signal data

# Refreshes data/copper-signal.json on a schedule. Conservative by default:
# only timestamps move unless source fetchers are explicitly enabled or
# manual overrides are supplied via workflow_dispatch inputs. No paid APIs.
#
# Schedule: weekdays at 09:30 America/New_York, excluding U.S. market
# holidays. Because GitHub's `schedule:` cron is UTC-only and has no DST
# or holiday awareness, we cron at BOTH 13:30 and 14:30 UTC Mon–Fri:
#   - 13:30 UTC == 09:30 America/New_York during EDT (Mar–Nov)
#   - 14:30 UTC == 09:30 America/New_York during EST (Nov–Mar)
# A guard step (`scripts/schedule-guard.mjs`) gates the actual run on the
# correct local time, weekday, and a transparent U.S./CME-style market
# holiday calendar (see that script for the full list and rationale).
# `workflow_dispatch` (manual) runs ALWAYS bypass the guard so a human
# rerun is never blocked.

on:
  workflow_dispatch:
    inputs:
      fetch_sources:
        description: "Attempt to fetch live source values (Stooq, Rockaway). 'true' or 'false'."
        required: false
        default: "false"
      copper_override:
        description: "Manual override for copper reference price (USD/lb). Leave blank to skip."
        required: false
        default: ""
      bare_bright_override:
        description: "Manual override for bare bright reference (USD/lb). Leave blank to skip."
        required: false
        default: ""
      insulated_override:
        description: "Manual override for insulated wire reference (USD/lb). Leave blank to skip."
        required: false
        default: ""
      fx_usd_cad_override:
        description: "Manual override for USD→CAD rate (e.g. 1.37). Leave blank to use Bank of Canada or previous value."
        required: false
        default: ""
  schedule:
    # Weekdays only. Two UTC entries cover both DST and standard time so
    # one of them lands on 09:30 America/New_York every weekday year-round.
    # The schedule-guard step picks the correct one and skips the other.
    - cron: "30 13 * * 1-5" # 09:30 EDT (Mar–Nov); 08:30 EST (Nov–Mar, skipped)
    - cron: "30 14 * * 1-5" # 10:30 EDT (Mar–Nov, skipped); 09:30 EST (Nov–Mar)

permissions:
  contents: write

concurrency:
  group: update-copper-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Pinned to immutable commit SHAs (with tag in comment) per GitHub's
      # supply-chain hardening guidance. Update both the SHA and the
      # comment when bumping. Last verified 2026-04-30:
      #   actions/checkout    @ v4.3.1 → 34e114876b0b11c390a56381ad16ebd13914f8d5
      #   actions/setup-node  @ v4.4.0 → 49933ea5288caeca8642d1e84afbd3f7d6820020
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      # Manual workflow_dispatch always bypasses the schedule guard so a
      # human-initiated rerun is never blocked by the local-time/holiday
      # check. Only `schedule`-triggered runs are gated.
      - name: Schedule guard (only on schedule trigger)
        id: guard
        if: github.event_name == 'schedule'
        run: node scripts/schedule-guard.mjs

      - name: Run updater
        # Run unconditionally on workflow_dispatch; on schedule, only when
        # the guard's `run` output is true.
        if: github.event_name != 'schedule' || steps.guard.outputs.run == 'true'
        env:
          FETCH_SOURCES: ${{ github.event.inputs.fetch_sources == 'true' && '1' || '0' }}
          COPPER_OVERRIDE: ${{ github.event.inputs.copper_override }}
          BARE_BRIGHT_OVERRIDE: ${{ github.event.inputs.bare_bright_override }}
          INSULATED_OVERRIDE: ${{ github.event.inputs.insulated_override }}
          FX_USD_CAD_OVERRIDE: ${{ github.event.inputs.fx_usd_cad_override }}
        run: node scripts/update-copper-data.mjs

      - name: Commit changes (if any)
        if: github.event_name != 'schedule' || steps.guard.outputs.run == 'true'
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain data/copper-signal.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/copper-signal.json
            git commit -m "chore(data): refresh copper-signal.json [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
