name: Update copper signal data

# Refreshes data/copper-signal.json on a schedule. Conservative by default:
# only timestamps move unless source fetchers are explicitly enabled or
# manual overrides are supplied via workflow_dispatch inputs. No paid APIs.
#
# Schedule: weekdays at 09:30 America/New_York, excluding U.S. market
# holidays. Because GitHub's `schedule:` cron is UTC-only and has no DST
# or holiday awareness, we cron at BOTH 13:30 and 14:30 UTC Mon–Fri:
#   - 13:30 UTC == 09:30 America/New_York during EDT (Mar–Nov)
#   - 14:30 UTC == 09:30 America/New_York during EST (Nov–Mar)
# A guard step (`scripts/schedule-guard.mjs`) gates the actual run on the
# correct local time, weekday, and a transparent U.S./CME-style market
# holiday calendar (see that script for the full list and rationale).
# `workflow_dispatch` (manual) runs ALWAYS bypass the guard so a human
# rerun is never blocked.

on:
  workflow_dispatch:
    inputs:
      fetch_sources:
        description: "Attempt to fetch live source values (Yahoo HG=F, Bank of Canada). 'true' or 'false'. Scheduled runs always fetch; this input only affects manual runs."
        required: false
        default: "true"
      copper_override:
        description: "Manual override for copper reference price (USD/lb). Leave blank to skip."
        required: false
        default: ""
      bare_bright_override:
        description: "Manual override for bare bright reference (USD/lb). Leave blank to skip."
        required: false
        default: ""
      insulated_override:
        description: "Manual override for insulated wire reference (USD/lb). Leave blank to skip."
        required: false
        default: ""
      fx_usd_cad_override:
        description: "Manual override for USD→CAD rate (e.g. 1.37). Leave blank to use Bank of Canada or previous value."
        required: false
        default: ""
  schedule:
    # Weekdays only. Two UTC entries cover both DST and standard time so
    # one of them lands on 09:30 America/New_York every weekday year-round.
    # The schedule-guard step picks the correct one and skips the other.
    - cron: "30 13 * * 1-5" # 09:30 EDT (Mar–Nov); 08:30 EST (Nov–Mar, skipped)
    - cron: "30 14 * * 1-5" # 10:30 EDT (Mar–Nov, skipped); 09:30 EST (Nov–Mar)

permissions:
  contents: write

concurrency:
  group: update-copper-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Pinned to immutable commit SHAs (with tag in comment) per GitHub's
      # supply-chain hardening guidance. Update both the SHA and the
      # comment when bumping. Last verified 2026-04-30:
      #   actions/checkout    @ v4.3.1 → 34e114876b0b11c390a56381ad16ebd13914f8d5
      #   actions/setup-node  @ v4.4.0 → 49933ea5288caeca8642d1e84afbd3f7d6820020
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      # Manual workflow_dispatch always bypasses the schedule guard so a
      # human-initiated rerun is never blocked by the local-time/holiday
      # check. Only `schedule`-triggered runs are gated.
      - name: Schedule guard (only on schedule trigger)
        id: guard
        if: github.event_name == 'schedule'
        run: node scripts/schedule-guard.mjs

      - name: Run updater
        # Run unconditionally on workflow_dispatch; on schedule, only when
        # the guard's `run` output is true.
        #
        # FETCH_SOURCES policy:
        #   - schedule events ALWAYS fetch live sources (FETCH_SOURCES=1).
        #     This is the whole point of the scheduled run; a timestamp-only
        #     bump on a cron tick would defeat the purpose. A regression
        #     where schedule runs landed with FETCH_SOURCES=0 was observed
        #     on the May 14 run and is what this guard rail prevents.
        #   - workflow_dispatch respects the `fetch_sources` input (defaults
        #     to 'true'; set to 'false' from the UI for a timestamp-only
        #     manual run, e.g. when re-publishing after a copy-only edit).
        #   - any other event_name (none configured today, defensive) goes
        #     through the same input-respecting path.
        if: github.event_name != 'schedule' || steps.guard.outputs.run == 'true'
        env:
          FETCH_SOURCES: ${{ github.event_name == 'schedule' && '1' || (github.event.inputs.fetch_sources != 'false' && '1' || '0') }}
          COPPER_OVERRIDE: ${{ github.event.inputs.copper_override }}
          BARE_BRIGHT_OVERRIDE: ${{ github.event.inputs.bare_bright_override }}
          INSULATED_OVERRIDE: ${{ github.event.inputs.insulated_override }}
          FX_USD_CAD_OVERRIDE: ${{ github.event.inputs.fx_usd_cad_override }}
        run: |
          # Validation: scheduled runs MUST fetch live sources. If something
          # ever wires FETCH_SOURCES=0 onto a schedule trigger (the May 14
          # regression), fail loudly instead of silently shipping a
          # timestamp-only refresh that looks successful in the run log.
          if [ "${GITHUB_EVENT_NAME:-}" = "schedule" ] && [ "${FETCH_SOURCES:-}" != "1" ]; then
            echo "::error::Scheduled run resolved FETCH_SOURCES='${FETCH_SOURCES:-<unset>}', expected '1'. Refusing to run a timestamp-only refresh on a schedule trigger."
            exit 1
          fi
          echo "Run updater env FETCH_SOURCES: ${FETCH_SOURCES}"
          node scripts/update-copper-data.mjs

      - name: Commit changes (if any)
        if: github.event_name != 'schedule' || steps.guard.outputs.run == 'true'
        run: |
          set -euo pipefail

          DATA_FILE="data/copper-signal.json"

          # If the updater produced no local diff, nothing to do.
          if [[ -z "$(git status --porcelain "$DATA_FILE")" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Reconcile with origin first: another concurrent run may have
          # already pushed an equivalent data commit (race). Stash our
          # working copy, pull --rebase, then re-check whether the file
          # still differs meaningfully from origin/main.
          git fetch origin main

          # Save the locally-updated data file to a side path so a rebase
          # cannot lose it. (We only ever modify this one tracked file.)
          cp "$DATA_FILE" "$RUNNER_TEMP/copper-signal.local.json"

          # Discard the local working tree change so rebase is clean,
          # then fast-forward / rebase onto origin/main.
          git checkout -- "$DATA_FILE"
          git pull --rebase --autostash origin main

          # Restore our freshly-computed data file on top of the rebased tree.
          cp "$RUNNER_TEMP/copper-signal.local.json" "$DATA_FILE"

          # If, after pulling, the file no longer differs from what is on
          # origin/main, another run already landed an equivalent refresh.
          # Treat as success.
          if git diff --quiet -- "$DATA_FILE"; then
            echo "Data file matches origin/main after pull; another run already refreshed it. Nothing to commit."
            exit 0
          fi

          git add "$DATA_FILE"
          git commit -m "chore(data): refresh copper-signal.json [skip ci]"

          # First push attempt.
          if git push origin HEAD:main; then
            echo "Pushed data refresh on first attempt."
            exit 0
          fi

          echo "Initial push failed; investigating remote state..."
          git fetch origin main

          LOCAL_HEAD="$(git rev-parse HEAD)"
          REMOTE_HEAD="$(git rev-parse origin/main)"

          # If our HEAD is already reachable from origin/main, somebody
          # (likely a sibling run) already pushed an equivalent commit.
          if git merge-base --is-ancestor "$LOCAL_HEAD" "$REMOTE_HEAD"; then
            echo "Local HEAD $LOCAL_HEAD is already contained in origin/main ($REMOTE_HEAD). Nothing to do."
            exit 0
          fi

          # Or, if origin/main's version of the data file matches ours,
          # the refresh is effectively already published — bail out clean.
          if git show "origin/main:$DATA_FILE" > "$RUNNER_TEMP/copper-signal.remote.json" 2>/dev/null \
             && cmp -s "$DATA_FILE" "$RUNNER_TEMP/copper-signal.remote.json"; then
            echo "origin/main already has an equivalent $DATA_FILE. Nothing to do."
            exit 0
          fi

          # Otherwise rebase our single data commit onto the new remote
          # tip and retry the push exactly once. No loops.
          echo "Rebasing onto origin/main and retrying push once..."
          git pull --rebase origin main
          git push origin HEAD:main
          echo "Pushed data refresh after one rebase retry."

